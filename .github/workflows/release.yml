name: Release

on:
  push:
    tags:
      - "v*"

# The code repo can stay private; artifacts are published to a small public
# "releases" repo (so the public site can link to them). Configure:
#   - vars.RELEASES_REPO       e.g. canbedir/microhone-releases (public)
#   - secrets.RELEASES_TOKEN   PAT with contents:write on that repo
#   - secrets.ANDROID_KEYSTORE_BASE64 / _PASSWORD, ANDROID_KEY_ALIAS / _PASSWORD
permissions:
  contents: read

jobs:
  desktop:
    name: Desktop installers
    runs-on: windows-latest
    env:
      CMAKE_POLICY_VERSION_MINIMUM: "3.5"
      # Sign the auto-updater artifacts (.sig).
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      - name: Build installers (NSIS + MSI)
        run: pnpm --filter @microhone/desktop tauri build
      - name: Stage artifacts with stable names
        shell: bash
        run: |
          mkdir dist-release
          cp apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe dist-release/microhone-windows-setup.exe
          cp apps/desktop/src-tauri/target/release/bundle/msi/*.msi dist-release/microhone-windows.msi
      - name: Build updater manifest (latest.json)
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          SIG=$(cat apps/desktop/src-tauri/target/release/bundle/nsis/*-setup.exe.sig)
          BASE="https://github.com/microhone/microhone/releases/latest/download"
          cat > dist-release/latest.json <<EOF
          {
            "version": "$VER",
            "notes": "microhone $VER",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIG",
                "url": "$BASE/microhone-windows-setup.exe"
              }
            }
          }
          EOF
      - name: Publish to the releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ vars.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_TOKEN }}
          files: dist-release/*

  android:
    name: Android signed APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: sdkmanager "platforms;android-35" "build-tools;35.0.0"
      - name: Restore signing keystore
        working-directory: apps/mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
          printf 'storeFile=release.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$STORE_PASSWORD" "$KEY_ALIAS" "$KEY_PASSWORD" > keystore.properties
      - name: Build signed release APK
        working-directory: apps/mobile
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon
      - name: Stage artifact with a stable name
        run: |
          mkdir dist-release
          cp apps/mobile/app/build/outputs/apk/release/app-release.apk dist-release/microhone-android.apk
      - name: Publish to the releases repo
        uses: softprops/action-gh-release@v2
        with:
          repository: ${{ vars.RELEASES_REPO }}
          token: ${{ secrets.RELEASES_TOKEN }}
          files: dist-release/*
